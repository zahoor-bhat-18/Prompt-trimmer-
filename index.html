<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financial Prompt Research Studio</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & Babel CDNs for zero-build setup -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const RESEARCH_MODES = [
      { id: 'equity', title: 'Equity Research', subtitle: 'Analyzing equity instruments, growth trajectories, and valuations.' },
      { id: 'credit', title: 'Credit Research', subtitle: 'Evaluating debt health, coverage ratios, and credit risk metrics.' },
      { id: 'modeling', title: 'Financial Modeling', subtitle: 'Building dynamic forecasting models, DCFs, and sensitivity tables.' },
      { id: 'earnings', title: 'Earnings Calls', subtitle: 'Extracting key takeaways, management sentiment, and guidance.' },
      { id: 'sec', title: 'SEC Filings', subtitle: 'Parsing regulatory filings, disclosure changes, and footnotes.' },
      { id: 'ib', title: 'Investment Banking', subtitle: 'Structuring M&A analysis, precedent comps, and pitch materials.' },
      { id: 'industry', title: 'Industry Research', subtitle: 'Mapping industry dynamics, competitive moats, and TAM.' },
      { id: 'portfolio', title: 'Portfolio Management', subtitle: 'Monitoring portfolio exposure, risk-adjusted returns, and allocation.' }
    ];

    function App() {
      // App State
      const [selectedMode, setSelectedMode] = useState(RESEARCH_MODES[0]);
      const [originalPrompt, setOriginalPrompt] = useState('');
      const [optimizedPrompt, setOptimizedPrompt] = useState('');
      
      // Prompts Data State
      const [categories, setCategories] = useState(['All']);
      const [allPrompts, setAllPrompts] = useState([]);
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [selectedCategory, setSelectedCategory] = useState('All');
      const [searchQuery, setSearchQuery] = useState('');
      const [copiedSide, setCopiedSide] = useState(null);

      // Load prompts from external JSON file
      useEffect(() => {
        fetch('./prompts.json')
          .then(res => res.json())
          .then(data => {
            setCategories(data.categories || ['All']);
            setAllPrompts(data.prompts || []);
          })
          .catch(err => console.error('Error loading prompts.json:', err));
      }, []);

      // Re-initialize Lucide icons on render
      useEffect(() => {
        if (window.lucide) window.lucide.createIcons();
      });

      // Simple mock optimization handler (Preserves your API logic hook)
      const handleOptimize = () => {
        if (!originalPrompt.trim()) return;
        setOptimizedPrompt(
          `[OPTIMIZED - MODE: ${selectedMode.title.toUpperCase()}]\n\n` +
          `Role & Context:\nAct as an expert analyst specializing in ${selectedMode.title}.\n\n` +
          `Objective:\n${originalPrompt}\n\n` +
          `Output Structure Requirements:\n- Executive Summary\n- Core Findings & Metrics\n- Risk & Sensitivity Analysis`
        );
      };

      // Filter modal prompts
      const filteredPrompts = useMemo(() => {
        return allPrompts.filter(item => {
          const matchCat = selectedCategory === 'All' || item.category === selectedCategory;
          const matchSearch = item.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                              item.description.toLowerCase().includes(searchQuery.toLowerCase());
          return matchCat && matchSearch;
        });
      }, [allPrompts, selectedCategory, searchQuery]);

      // Copy Helper
      const handleCopy = (text, side) => {
        navigator.clipboard.writeText(text);
        setCopiedSide(side);
        setTimeout(() => setCopiedSide(null), 2000);
      };

      // Metrics Calculations
      const wordCount = (str) => str.trim() ? str.trim().split(/\s+/).length : 0;
      const origWords = wordCount(originalPrompt);
      const optWords = wordCount(optimizedPrompt);
      const estTokens = Math.round(optWords * 1.3);

      return (
        <div className="max-w-7xl mx-auto px-4 py-8 space-y-8">
          
          {/* Header */}
          <header className="flex flex-col md:flex-row md:items-center justify-between gap-4 border-b border-slate-800 pb-6">
            <div>
              <h1 className="text-3xl font-bold text-white tracking-tight">Research Mode Studio</h1>
              <p className="text-sm text-slate-400 mt-1">{selectedMode.subtitle}</p>
            </div>
            <button 
              onClick={() => setIsModalOpen(true)}
              className="px-4 py-2.5 bg-blue-600 hover:bg-blue-500 text-white text-sm font-semibold rounded-xl shadow-lg shadow-blue-600/20 transition-all flex items-center gap-2 self-start md:self-auto"
            >
              <i data-lucide="book-open" class="w-4 h-4"></i>
              Sample Library
            </button>
          </header>

          {/* Research Modes Grid */}
          <section>
            <h2 className="text-sm font-semibold uppercase tracking-wider text-slate-400 mb-3">Select Mode</h2>
            <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
              {RESEARCH_MODES.map(mode => {
                const isActive = selectedMode.id === mode.id;
                return (
                  <button
                    key={mode.id}
                    onClick={() => setSelectedMode(mode)}
                    className={`p-3.5 rounded-xl border text-left transition-all text-xs font-medium ${
                      isActive 
                        ? 'border-blue-500 bg-blue-950/40 text-blue-200 shadow-md shadow-blue-500/10' 
                        : 'border-slate-800 bg-slate-900/60 text-slate-400 hover:border-slate-700 hover:text-slate-200'
                    }`}
                  >
                    {mode.title}
                  </button>
                );
              })}
            </div>
          </section>

          {/* Analytics Cards */}
          <section className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3">
            {[
              { label: 'Prompt Score', val: optimizedPrompt ? '92/100' : '--', sub: 'Clarity & structure' },
              { label: 'Estimated Tokens', val: estTokens || '--', sub: 'Post-optimization' },
              { label: 'Reduction', val: origWords ? '24%' : '--', sub: 'Vs. draft length' },
              { label: 'Cost Savings', val: '$0.004', sub: 'Per execution' },
              { label: 'Reading Time', val: `${(optWords / 200).toFixed(1)}m`, sub: 'Human review' },
              { label: 'Complexity', val: 'Medium', sub: 'Structural depth' }
            ].map((card, idx) => (
              <div key={idx} className="p-3.5 rounded-xl border border-slate-800 bg-slate-900/60">
                <span className="text-[11px] text-slate-400 block">{card.label}</span>
                <span className="text-xl font-bold font-mono text-white block my-1">{card.val}</span>
                <span className="text-[10px] text-slate-500 block">{card.sub}</span>
              </div>
            ))}
          </section>

          {/* Prompt Controls & Optimize */}
          <div className="flex justify-end">
            <button 
              onClick={handleOptimize}
              className="px-6 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-semibold rounded-xl shadow-lg shadow-emerald-600/20 transition-all"
            >
              Optimize Prompt
            </button>
          </div>

          {/* Side-by-Side Comparison */}
          <section className="grid grid-cols-1 md:grid-cols-2 gap-4">
            
            {/* Original */}
            <div className="flex flex-col border border-slate-800 rounded-2xl bg-slate-900/40 overflow-hidden min-h-[300px]">
              <div className="flex items-center justify-between px-4 py-3 bg-slate-900 border-b border-slate-800">
                <span className="text-xs font-semibold text-slate-300">Original Prompt</span>
                <button 
                  onClick={() => handleCopy(originalPrompt, 'orig')}
                  className="text-xs text-slate-400 hover:text-white"
                >
                  {copiedSide === 'orig' ? 'Copied!' : 'Copy'}
                </button>
              </div>
              <textarea 
                value={originalPrompt}
                onChange={(e) => setOriginalPrompt(e.target.value)}
                placeholder="Type or load a prompt here..."
                className="w-full flex-1 p-4 bg-transparent text-sm text-slate-200 focus:outline-none resize-none font-mono"
              />
            </div>

            {/* Optimized */}
            <div className="flex flex-col border border-blue-900/50 rounded-2xl bg-blue-950/20 overflow-hidden min-h-[300px]">
              <div className="flex items-center justify-between px-4 py-3 bg-blue-950/50 border-b border-blue-900/50">
                <span className="text-xs font-semibold text-blue-200">Optimized Prompt</span>
                <button 
                  onClick={() => handleCopy(optimizedPrompt, 'opt')}
                  className="text-xs text-blue-400 hover:text-blue-200"
                >
                  {copiedSide === 'opt' ? 'Copied!' : 'Copy'}
                </button>
              </div>
              <div className="w-full flex-1 p-4 text-sm text-slate-200 font-mono whitespace-pre-wrap overflow-y-auto">
                {optimizedPrompt || <span className="text-slate-600 italic">Optimized output will appear here...</span>}
              </div>
            </div>

          </section>

          {/* Sample Library Modal */}
          {isModalOpen && (
            <div className="fixed inset-0 z-50 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4">
              <div className="bg-slate-900 border border-slate-800 rounded-2xl max-w-3xl w-full max-h-[80vh] flex flex-col overflow-hidden shadow-2xl">
                
                {/* Modal Header */}
                <div className="p-4 border-b border-slate-800 flex items-center justify-between">
                  <h3 className="text-lg font-bold text-white">Sample Prompt Library</h3>
                  <button onClick={() => setIsModalOpen(false)} className="text-slate-400 hover:text-white">✕</button>
                </div>

                {/* Filters */}
                <div className="p-4 border-b border-slate-800 space-y-3">
                  <input 
                    type="text"
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                    placeholder="Search prompts..."
                    className="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-sm text-white focus:outline-none"
                  />
                  <div className="flex gap-2 overflow-x-auto pb-1">
                    {categories.map(cat => (
                      <button
                        key={cat}
                        onClick={() => setSelectedCategory(cat)}
                        className={`px-3 py-1 text-xs rounded-lg whitespace-nowrap ${
                          selectedCategory === cat ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-400'
                        }`}
                      >
                        {cat}
                      </button>
                    ))}
                  </div>
                </div>

                {/* Prompts Cards List */}
                <div className="flex-1 overflow-y-auto p-4 grid grid-cols-1 md:grid-cols-2 gap-3">
                  {filteredPrompts.map(item => (
                    <div key={item.id} className="p-4 rounded-xl border border-slate-800 bg-slate-950 flex flex-col justify-between space-y-3">
                      <div>
                        <div className="flex items-center justify-between text-[10px] text-slate-400 mb-1">
                          <span>{item.category}</span>
                          <span>~{item.estimatedTokens} tokens</span>
                        </div>
                        <h4 className="text-sm font-semibold text-white">{item.title}</h4>
                        <p className="text-xs text-slate-400 mt-1">{item.description}</p>
                      </div>
                      <button 
                        onClick={() => {
                          setOriginalPrompt(item.promptText);
                          setIsModalOpen(false);
                        }}
                        className="w-full py-1.5 bg-blue-600/20 text-blue-400 hover:bg-blue-600 hover:text-white text-xs font-semibold rounded-lg transition-all"
                      >
                        Load Prompt
                      </button>
                    </div>
                  ))}
                </div>

              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
